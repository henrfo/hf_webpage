<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Henrik Formoe</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@100;200;300&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030305;
    }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 22vw;
    }

    .box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 240px;
      height: 130px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Exo 2', sans-serif;
      font-size: 1.05rem;
      font-weight: 200;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.6s ease, color 0.6s ease;
    }

    .box:hover {
      border-color: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.85);
    }

    @media (max-width: 600px) {
      .hero {
        flex-direction: column;
        gap: 20vh;
      }

      .box {
        width: 200px;
        height: 110px;
        font-size: 0.95rem;
      }
    }
    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.5s ease !important;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="hero">
    <a href="https://stratanova.no" class="box">Science</a>
    <a href="https://senenetterogovertid.no" class="box">Film</a>
  </div>

  <script>
    document.querySelectorAll('.box').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var href = this.href;
        document.body.classList.add('fade-out');
        setTimeout(function() { window.location.href = href; }, 500);
      });
    });

    const canvas = document.getElementById('bg');
    const gl = canvas.getContext('webgl', {
      antialias: false,
      depth: false,
      stencil: false,
      alpha: false,
      preserveDrawingBuffer: false
    });

    const vertSrc = `
      attribute vec2 pos;
      void main() { gl_Position = vec4(pos, 0.0, 1.0); }
    `;

    const fragSrc = `
      precision highp float;
      uniform float u_time;
      uniform vec2 u_res;

      #define NUM_BIG 4
      #define NUM_SMALL 4

      // --- Large blobs: 3-layer wandering ---
      vec2 bigPos(int i, float t) {
        float s = t * 0.009;
        float slow = t * 0.002;
        if (i == 0) return vec2(
          0.5 + 0.35 * sin(s * 0.71) + 0.15 * sin(s * 1.13) + 0.4 * sin(slow * 0.31),
          0.5 + 0.3 * cos(s * 0.63 + 1.0) + 0.12 * cos(s * 0.97) + 0.4 * cos(slow * 0.23 + 1.7)
        );
        if (i == 1) return vec2(
          0.5 + 0.38 * sin(s * 0.53 + 2.1) + 0.16 * cos(s * 1.07) + 0.42 * cos(slow * 0.29 + 3.1),
          0.5 + 0.32 * cos(s * 0.79 + 0.5) + 0.1 * sin(s * 1.31) + 0.38 * sin(slow * 0.19 + 0.4)
        );
        if (i == 2) return vec2(
          0.5 + 0.3 * sin(s * 0.89 + 4.2) + 0.18 * sin(s * 0.67) + 0.45 * cos(slow * 0.37 + 5.2),
          0.5 + 0.35 * cos(s * 0.47 + 3.1) + 0.14 * cos(s * 1.19) + 0.4 * sin(slow * 0.27 + 2.8)
        );
        // i == 3
        return vec2(
          0.5 + 0.33 * cos(s * 0.61 + 1.7) + 0.13 * sin(s * 1.23) + 0.42 * sin(slow * 0.33 + 1.1),
          0.5 + 0.28 * sin(s * 0.83 + 5.3) + 0.15 * cos(s * 0.71) + 0.38 * cos(slow * 0.21 + 4.5)
        );
      }

      float bigRadius(int i, float t) {
        float base, spd, phase;
        if (i == 0)      { base = 0.65; spd = 0.15;  phase = 0.0; }
        else if (i == 1) { base = 0.7;  spd = 0.11;  phase = 1.8; }
        else if (i == 2) { base = 0.6;  spd = 0.18;  phase = 3.5; }
        else             { base = 0.68; spd = 0.13;  phase = 5.1; }
        return base * (1.0 + 0.2 * sin(t * spd + phase));
      }

      // --- Small blobs: slightly faster ---
      vec2 smallPos(int i, float t) {
        float s = t * 0.016;
        float slow = t * 0.003;
        if (i == 0) return vec2(
          0.5 + 0.3 * sin(s * 0.83 + 0.7) + 0.1 * cos(s * 1.41) + 0.4 * cos(slow * 0.37 + 1.2),
          0.5 + 0.28 * cos(s * 0.59 + 2.3) + 0.08 * sin(s * 1.17) + 0.38 * sin(slow * 0.29 + 4.3)
        );
        if (i == 1) return vec2(
          0.5 + 0.32 * cos(s * 0.67 + 4.5) + 0.12 * sin(s * 1.29) + 0.42 * sin(slow * 0.23 + 5.6),
          0.5 + 0.26 * sin(s * 0.91 + 1.1) + 0.1 * cos(s * 0.73) + 0.4 * cos(slow * 0.33 + 0.8)
        );
        if (i == 2) return vec2(
          0.5 + 0.28 * sin(s * 1.03 + 3.2) + 0.14 * cos(s * 0.61) + 0.38 * cos(slow * 0.31 + 3.4),
          0.5 + 0.32 * cos(s * 0.73 + 5.7) + 0.07 * sin(s * 1.37) + 0.42 * sin(slow * 0.26 + 1.9)
        );
        // i == 3
        return vec2(
          0.5 + 0.3 * cos(s * 0.79 + 0.3) + 0.11 * sin(s * 1.11) + 0.4 * sin(slow * 0.34 + 2.7),
          0.5 + 0.27 * sin(s * 1.07 + 3.9) + 0.12 * cos(s * 0.53) + 0.38 * cos(slow * 0.21 + 5.1)
        );
      }

      float smallRadius(int i, float t) {
        float base, spd, phase;
        if (i == 0)      { base = 0.22; spd = 0.19;  phase = 0.7; }
        else if (i == 1) { base = 0.25; spd = 0.14;  phase = 2.9; }
        else if (i == 2) { base = 0.2;  spd = 0.21;  phase = 4.3; }
        else             { base = 0.23; spd = 0.16;  phase = 1.2; }
        return base * (1.0 + 0.2 * sin(t * spd + phase));
      }

      // Color — smooth sine-wave blending, no stepped segments
      // Each RGB channel is a continuous cosine wave at different phases
      vec3 blobColor(float phaseSpeed, float phaseOffset, float satMul, float t) {
        float p = t * phaseSpeed + phaseOffset;
        // Cosine palette technique — perfectly smooth, no discontinuities
        // a = base brightness, b = amplitude, c = frequency, d = phase offset per channel
        vec3 a = vec3(0.08, 0.05, 0.09);
        vec3 b = vec3(0.07, 0.04, 0.08);
        vec3 c = vec3(1.0, 1.0, 1.0);
        vec3 d = vec3(0.0, 0.33, 0.67); // R/G/B offset — creates hue rotation
        vec3 col = a + b * cos(6.28318 * (c * p + d));
        return col * satMul;
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / u_res;
        float aspect = u_res.x / u_res.y;
        vec2 p = vec2(uv.x * aspect, uv.y);
        float t = u_time;

        vec3 col = vec3(0.008, 0.01, 0.018);

        // Big blobs — offsets spaced 0.25 apart (1/4), max color distance
        for (int i = 0; i < NUM_BIG; i++) {
          vec2 center = bigPos(i, t);
          center.x *= aspect;
          float d = distance(p, center);
          float r = bigRadius(i, t);
          float intensity = exp(-2.0 * (d * d) / (r * r));

          float spd, off, sat;
          if (i == 0)      { spd = 0.0024; off = 0.0;  sat = 1.4; }  // starts blue
          else if (i == 1) { spd = 0.0017; off = 0.25; sat = 0.7; }  // starts orange
          else if (i == 2) { spd = 0.0027; off = 0.5;  sat = 1.5; }  // starts violet
          else             { spd = 0.0013; off = 0.75; sat = 0.9; }  // starts ocean

          col += blobColor(spd, off, sat, t) * intensity;
        }

        // Small blobs — offset halfway between big blobs
        for (int i = 0; i < NUM_SMALL; i++) {
          vec2 center = smallPos(i, t);
          center.x *= aspect;
          float d = distance(p, center);
          float r = smallRadius(i, t);
          float intensity = exp(-2.0 * (d * d) / (r * r));

          float spd, off, sat;
          if (i == 0)      { spd = 0.0031; off = 0.125; sat = 1.2; }  // between blue & orange
          else if (i == 1) { spd = 0.0022; off = 0.375; sat = 0.6; }  // between orange & violet
          else if (i == 2) { spd = 0.0034; off = 0.625; sat = 1.6; }  // between violet & ocean
          else             { spd = 0.0019; off = 0.875; sat = 0.8; }  // between ocean & blue

          col += blobColor(spd, off, sat, t) * intensity * 0.7;
        }

        // Vignette
        float vig = 1.0 - length((uv - 0.5) * 1.4);
        vig = smoothstep(0.0, 0.7, vig);
        col *= vig * 0.85 + 0.15;

        // Dither: break 8-bit quantization banding
        float n = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) - 0.5;
        vec3 dither = vec3(n, n, n) / 255.0;
        gl_FragColor = vec4(col + dither, 1.0);
      }
    `;

    function createShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
      }
      return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
    gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error('Link error:', gl.getProgramInfoLog(prog));
    }
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const posLoc = gl.getAttribLocation(prog, 'pos');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    const timeLoc = gl.getUniformLocation(prog, 'u_time');
    const resLoc = gl.getUniformLocation(prog, 'u_res');

    // Random offset so each page load starts at a different point
    const timeOffset = Math.random() * 100000;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function render(t) {
      gl.uniform1f(timeLoc, (t * 0.001) + timeOffset);
      gl.uniform2f(resLoc, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
